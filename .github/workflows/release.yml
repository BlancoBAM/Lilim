name: Release Deb
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev debhelper
      - name: Build .deb
        run: bash packaging/build_deb.sh
      - name: Create Release and Upload Deb
        uses: ncipollo/release-action@v1
        with:
          artifacts: dist/*.deb
          tag: v${{ github.run_number }}
          name: Lilim Release ${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
