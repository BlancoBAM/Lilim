name: Release Deb
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js (for UI build)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build Lilim Desktop (if present)
        run: |
          if [ -f lilim_desktop/package.json ]; then
            cd lilim_desktop
            npm ci
            npm run build
            cd ..
          else
            echo "lilim_desktop/package.json not found; skipping UI build."
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev debhelper
      - name: Build lilim-runtime (Rust runtime) if required by packaging
        run: |
          if [ ! -x crates/lilim-runtime/target/release/lilim-runtime ]; then
            echo "Building lilim-runtime (Rust runtime) for packaging..."
            if [ -f crates/lilim-runtime/Cargo.toml ]; then
              cd crates/lilim-runtime
              cargo build --release
              cd -
            else
              echo "No Cargo.toml found for lilim-runtime; skipping build."
            fi
          else
            echo "lilim-runtime binary already present."
          fi
      - name: Build .deb
        run: bash packaging/build_deb.sh
      - name: Determine Release Tag
        id: detag
        run: |
          TAG="v0.0.0-prod-$(date +%Y%m%d%H%M%S)"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_OUTPUT
      - name: Create Release and Upload Deb
        uses: ncipollo/release-action@v1
        with:
          artifacts: dist/*.deb
          tag: ${{ steps.detag.outputs.RELEASE_TAG }}
          name: Lilim Release ${{ steps.detag.outputs.RELEASE_TAG }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
