# Lilim AI Assistant Configuration
# Lilith Linux — Local-First Architecture
# Last updated: 2026-05-04
#
# Architecture overview:
#   ┌──────────────────────────────────────────────────────┐
#   │  Tauri Desktop UI  →  Rust Runtime (port 8080)       │
#   │                         │                            │
#   │              ┌──────────┴─────────┐                  │
#   │              ▼                    ▼                   │
#   │     Candle Phi-2 (local)    Python Brain (8081)       │
#   │     GGUF Q4_K_M             litellm → online APIs    │
#   └──────────────────────────────────────────────────────┘

# ═══════════════════════════════════════════════════════════
# Local Inference Engine (Rust/Candle — Primary)
# ═══════════════════════════════════════════════════════════
local_inference:
  # Phi-2 2.7B Q4_K_M — the only local model currently bundled.
  # Model files live at ~/.local/share/lilim/models/phi-2-q4/
  # or /usr/lib/lilim/models/phi-2-q4/ (bundled in .deb).
  model: "phi-2-q4"
  model_type: "gguf"
  context_size: 2048
  max_gen_tokens: 256
  temperature: 0.5
  top_p: 0.9

  # Device selection — CPU-only (no CUDA/Metal on this hardware)
  device: "cpu"

  # Warmup: pre-run a dummy forward pass at startup so the first
  # real request isn't slow from cold cache. Adds ~7s to startup.
  warmup_on_startup: true

# ═══════════════════════════════════════════════════════════
# Online Provider Configuration (Optional Fallback)
# Keys are read from environment variables — never hardcoded.
# Add keys via: Settings → API Keys, or export in ~/.profile
# ═══════════════════════════════════════════════════════════
providers:
  # Provider list is ordered by priority (first available wins).
  # All are disabled by default — enable by setting the env var.
  online:
    - name: "openai"
      enabled: false   # Set to true when OPENAI_API_KEY is present
      api_key_env: "OPENAI_API_KEY"
      model: "gpt-4o-mini"
      timeout_s: 30
      max_tokens: 4096
      temperature: 0.7

    - name: "anthropic"
      enabled: false   # Set to true when ANTHROPIC_API_KEY is present
      api_key_env: "ANTHROPIC_API_KEY"
      model: "claude-3-5-haiku-20241022"
      timeout_s: 30
      max_tokens: 4096

    - name: "gemini"
      enabled: false   # Set to true when GEMINI_API_KEY is present
      api_key_env: "GEMINI_API_KEY"
      model: "gemini-2.0-flash"
      timeout_s: 30
      max_tokens: 4096

    - name: "groq"
      enabled: false   # Groq free tier — fast inference
      api_key_env: "GROQ_API_KEY"
      model: "llama-3.1-8b-instant"
      timeout_s: 15
      max_tokens: 4096

# ═══════════════════════════════════════════════════════════
# Routing (Local vs. Online Decision)
# Handled by Python Brain (/route endpoint).
# ═══════════════════════════════════════════════════════════
routing:
  # Always try local first
  prefer_local: true

  # Fall back to online only when:
  fallback_triggers:
    - local_model_unavailable: true    # Engine failed to load
    - online_key_present: true         # User has configured a key
                                       # AND explicitly wants it

  # Task hints — used by Python brain's routing oracle
  # to select best provider per query type
  task_routes:
    medical_study: "local"
    linux_help: "local"
    academic: "local"
    coding: "local"
    creative_writing: "online_preferred"
    latest_news: "online_required"

# ═══════════════════════════════════════════════════════════
# Memory / Conversation History
# Managed by Python Brain (SQLite in-process)
# ═══════════════════════════════════════════════════════════
memory:
  db_path: "/home/aegon/.local/share/lilim/memory.db"
  max_history_messages: 20
  session_timeout_s: 7200       # 2 hours of inactivity resets context
  context_strategy: "sliding"   # sliding | truncate
  max_context_tokens: 1024      # Keep short — local model has 2048 ctx total

# ═══════════════════════════════════════════════════════════
# Agent / Tool Execution
# All tool calls require explicit user confirmation.
# ═══════════════════════════════════════════════════════════
agent:
  enable_file_ops: true        # Read files, create/write documents
  enable_terminal: true        # Run shell commands (with confirmation)
  enable_web_search: false     # Disabled until search tool is implemented
  require_confirmation: true   # NEVER run tools autonomously
  tool_timeout_s: 30

  # Allowlist for shell commands (confirmation still required)
  allowed_commands:
    - "ls"
    - "cat"
    - "grep"
    - "find"
    - "df"
    - "free"
    - "systemctl status"
    - "journalctl"
    - "ps"
    - "ip"
    - "ss"

# ═══════════════════════════════════════════════════════════
# System Integration
# ═══════════════════════════════════════════════════════════
system:
  # Global hotkeys (implemented in Tauri frontend)
  hotkeys:
    toggle_ui: "Ctrl+L"      # Show/hide Lilim window

  # System tray — removed (no longer used, handled by Tauri)
  tray: false

  # TTS / screen reader — removed, moved to separate application
  tts: false
  screen_reader: false

# ═══════════════════════════════════════════════════════════
# Server Configuration (Rust Runtime)
# ═══════════════════════════════════════════════════════════
server:
  # Rust proxy gateway — Tauri talks to this
  gateway_host: "127.0.0.1"
  gateway_port: 8080

  # Python brain — Rust starts and manages this process
  brain_host: "127.0.0.1"
  brain_port: 8081

  cors_origins:
    - "tauri://localhost"
    - "http://localhost:1420"   # Vite dev server

# ═══════════════════════════════════════════════════════════
# Personality Configuration
# Applied by Python Brain to all responses regardless of
# which model (local Phi-2 or online provider) is used.
# ═══════════════════════════════════════════════════════════
personality:
  responses_yaml_path: "/etc/lilith/lilim-responses.yaml"
  always_apply: true          # Inject persona into EVERY system prompt
  theme_intensity: 0.15       # 0.0 = no flavor, 1.0 = full demon mode
  sarcasm_level: 0.25

  # Target audience (informs tone calibration)
  target_user: "first-year medical assistant student, non-technical"
  specializations:
    - "Medical Assistant coursework (A&P, terminology, clinical procedures)"
    - "Ubuntu/Linux troubleshooting and system administration"
    - "First-year college subjects (biology, math, writing, test prep)"

# ═══════════════════════════════════════════════════════════
# Logging Configuration
# ═══════════════════════════════════════════════════════════
logging:
  level: "info"               # trace | debug | info | warn | error
  log_routing_decisions: true  # Log which engine handled each query
  log_queries: false           # Disable for privacy (no query logging)
  log_responses: false         # Disable for privacy

# ═══════════════════════════════════════════════════════════
# Performance Tuning
# ═══════════════════════════════════════════════════════════
performance:
  # Request timeout — Phi-2 on i5-6200U needs up to 5 mins
  # for a complex prompt. The UI shows thinking indicators during this.
  query_timeout_s: 300        # 5 minutes max

  # Concurrent request handling
  max_concurrent_queries: 1   # Single-threaded inference — queue extras

  # Response caching (exact-match cache for repeated queries)
  enable_cache: false         # Disabled — responses vary by context

